name: Oris Dental – Feed Sync

on:
  schedule:
    - cron: "0 7-15 * * 1-5"
    - cron: "0 8-12 * * 6"
  workflow_dispatch:

jobs:
  generate-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install requests playwright beautifulsoup4

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run feed generator
        env:
          ORIS_BEARER_TOKEN: ${{ secrets.ORIS_BEARER_TOKEN }}
        run: python scraper.py

      - name: Commit and push feed
        run: |
          git config user.name "Feed Bot"
          git config user.email "feedbot@orisdental-feed"
          git add docs/feed.xml
          git diff --staged --quiet || git commit -m "chore: update feed $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
